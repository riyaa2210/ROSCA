services:
  # ── Backend Web Service ──────────────────────────────────────────────────────
  - type: web
    name: savesangam-api
    runtime: node
    rootDir: server
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false   # set to your frontend URL after deploying frontend

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: savesangam-frontend
    runtime: static
    rootDir: client
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend URL e.g. https://savesangam-api.onrender.com
    headers:
      - path: "/*"
        name: Cache-Control
        value: "no-cache"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
