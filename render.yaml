services:
  - type: web
    name: bhishi-app
    runtime: node
    rootDir: .
    # 1. Install server deps  2. Build React into server/public  3. Start
    buildCommand: "npm install --prefix server && npm install --prefix client && npm run build --prefix client"
    startCommand: "node server/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLIENT_URL
        sync: false          # set to your Render app URL e.g. https://bhishi-app.onrender.com
